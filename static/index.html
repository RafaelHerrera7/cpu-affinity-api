<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Process Monitor</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="container">
    <header>
      <img src="/favicon.ico" style="width:32px;height:32px;image-rendering:pixelated" alt="logo" />
      <div class="controls">
        <input id="filter" placeholder="Filtrar por nombre o PID..." />
        <div class="filter-btns">
          <button class="filter-btn"        id="fb-all"        onclick="setFilterMode('all')">Todos</button>
          <button class="filter-btn active" id="fb-free"       onclick="setFilterMode('free')">Modificables</button>
          <button class="filter-btn"        id="fb-restricted" onclick="setFilterMode('restricted')">Restringidos</button>
        </div>
        <div class="status">
          <div class="dot connecting" id="dot"></div>
          <span id="status-text">Connecting...</span>
        </div>
      </div>
    </header>

    <div class="configs-panel">
      <span class="configs-label">Perfiles</span>
      <div id="config-chips"></div>
      <button class="new-profile-btn" onclick="toggleNewProfileForm()">+ Nuevo</button>
    </div>

    <div class="new-profile-panel" id="new-profile-panel" style="display:none">
      <div class="np-header">
        <span class="configs-label">Nuevo perfil</span>
        <input class="np-name" id="np-name" placeholder="Nombre del perfil..." onkeydown="if(event.key==='Enter')createProfileFromTop()" />
        <div class="np-actions">
          <button class="link-btn" onclick="setNewProfileMask(allCoresMask())">Todos</button>
          <button class="link-btn" onclick="setNewProfileMask(0)">Ninguno</button>
          <span class="mask-val" id="np-mask-val">mask: 0</span>
          <button class="save-as-btn" onclick="createProfileFromTop()">Crear</button>
          <button class="link-btn" style="color:#475569" onclick="toggleNewProfileForm()">Cancelar</button>
        </div>
      </div>
      <div class="np-cores" id="np-cores"></div>
      <div class="np-quick">
        <span class="np-quick-label">Rápido:</span>
        <span class="preset-chip" onclick="setNewProfileMask(allCoresMask())">Todos los cores</span>
        <span class="preset-chip" onclick="setNewProfileMask(0x5555n&allCoresMask())">Cores pares</span>
        <span class="preset-chip" onclick="setNewProfileMask(0xAAAAn&allCoresMask())">Cores impares</span>
        <span class="preset-chip" onclick="setNewProfileMask(0xFFn&allCoresMask())">Primeros 8</span>
        <span class="preset-chip" onclick="setNewProfileMask(0x0Fn)">Primeros 4</span>
      </div>
    </div>

    <div class="table-wrap">
      <table>
        <colgroup>
          <col class="col-pid" />
          <col class="col-name" />
          <col class="col-ppid" />
          <col class="col-cpu" />
          <col class="col-act" />
        </colgroup>
        <thead id="thead"><tr>
          <th class="sortable" onclick="setSort('pid')"  id="th-pid">PID</th>
          <th class="sortable" onclick="setSort('name')" id="th-name">Name</th>
          <th class="sortable" onclick="setSort('ppid')" id="th-ppid">PPID</th>
          <th class="sortable" onclick="setSort('cpu')"  id="th-cpu" style="text-align:right">CPU</th>
          <th></th>
        </tr></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>

    <div class="footer">
      <span id="count"></span>
      <span id="updated"></span>
      <span id="version" style="opacity:0.4;font-size:0.75rem"></span>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
